name: Browser Smoke Tests
# Run deterministic browser smoke tests on pushes, PRs, and manual dispatches.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  browser-smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run Browser Smoke Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: uv run pytest tests/test_frontend_browser.py -v --run-browser --junitxml=browser-smoke-results.xml

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: browser-smoke-results
          path: browser-smoke-results.xml
          retention-days: 7
