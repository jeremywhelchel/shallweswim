# Pre-commit configuration for shallweswim
# Philosophy: Fast hooks only. Pyrefly type checking is <1s for the whole project.
repos:
  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Prettier for non-Python files (excluding Markdown)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
        types_or: [yaml, json, html, css, javascript]

  # Biome for JavaScript linting
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.3.6
    hooks:
      - id: biome-lint
        files: ^shallweswim/static/.*\.js$

  # Rumdl for Markdown (Rust-based, protects wiki links)
  - repo: local
    hooks:
      - id: rumdl
        name: rumdl markdown linter
        entry: rumdl check . --fix
        language: system
        types: [markdown]

  # Ruff - fast Python linter and formatter (no venv needed)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Pyrefly - fast type checker (<1s for the whole project)
  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly type check
        entry: uv run pyrefly check .
        language: system
        types: [python]
        pass_filenames: false
