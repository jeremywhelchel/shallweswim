name: Type Checking
# Run deterministic type checks on pushes, PRs, and manual dispatches.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pyrefly:
    runs-on: ubuntu-latest
    name: Run pyrefly type checker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pyrefly type checking
        run: uv run pyrefly check .
