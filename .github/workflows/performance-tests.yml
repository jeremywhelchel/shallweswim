name: Performance Tests
# Run request-path performance guardrails separately from correctness tests.
on:
  # Run weekly to catch drift without making every PR depend on runner timing.
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  performance-tests:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-performance-tests') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run Performance Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run performance tests
        env:
          PERFORMANCE_RESULTS_PATH: performance-results.json
        run: uv run pytest tests/performance -v --run-performance --junitxml=performance-test-results.xml

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-test-results
          path: |
            performance-results.json
            performance-test-results.xml
          retention-days: 14
