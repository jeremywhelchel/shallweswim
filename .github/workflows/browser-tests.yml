name: Browser Tests
# Run deterministic browser and React/FastAPI stack tests.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run Browser Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.3 --activate
          pnpm --version

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build React frontend
        run: pnpm --dir frontend build

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Run browser tests
        run: uv run pytest tests/test_frontend_browser.py -v --run-browser --junitxml=jinja-browser-results.xml

      - name: Run React/FastAPI browser stack tests
        run: uv run pytest tests/test_react_stack_browser.py -v --run-browser --junitxml=react-stack-browser-results.xml

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: browser-test-results
          path: |
            jinja-browser-results.xml
            react-stack-browser-results.xml
          retention-days: 7
