name: Browser Smoke Tests
# Run optional browser smoke tests on a schedule, manually, or on labeled PRs.
on:
  # Run every 4 hours, offset from integration tests.
  schedule:
    - cron: "30 */4 * * *"
  # Allow manual triggering of the workflow.
  workflow_dispatch:
  # Optionally run on PR labeled with 'run-browser-smoke-tests'.
  pull_request:
    types: [labeled]

jobs:
  browser-smoke-tests:
    # Only run on PRs with specific label.
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-browser-smoke-tests') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run Browser Smoke Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: uv run pytest tests/test_frontend_browser.py -v --run-browser --junitxml=browser-smoke-results.xml

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: browser-smoke-results
          path: browser-smoke-results.xml
          retention-days: 7
